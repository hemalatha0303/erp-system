<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - SIH25103 ERP System</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .reset-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 450px;
            width: 100%;
            padding: 40px;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .reset-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .reset-header .icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 28px;
            color: white;
        }

        .reset-header h1 {
            color: #333;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .reset-header p {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .form-group input:disabled {
            background-color: #f5f5f5;
            cursor: not-allowed;
        }

        .input-with-icon {
            position: relative;
        }

        .input-with-icon input {
            padding-right: 40px;
        }

        .toggle-password {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #667eea;
            font-size: 18px;
            transition: color 0.3s;
        }

        .toggle-password:hover {
            color: #764ba2;
        }

        .password-strength {
            font-size: 12px;
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .strength-bar {
            flex: 1;
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            overflow: hidden;
        }

        .strength-fill {
            height: 100%;
            width: 0%;
            transition: width 0.3s ease, background-color 0.3s ease;
        }

        .strength-weak { background-color: #ff6b6b; }
        .strength-fair { background-color: #ffa500; }
        .strength-good { background-color: #4ecdc4; }
        .strength-strong { background-color: #27ae60; }

        .password-requirements {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 12px 15px;
            border-radius: 6px;
            margin-top: 15px;
            font-size: 13px;
        }

        .requirement {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 6px 0;
            color: #666;
        }

        .requirement-icon {
            font-size: 12px;
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .requirement.met .requirement-icon {
            color: #27ae60;
        }

        .requirement.unmet .requirement-icon {
            color: #ccc;
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            font-family: 'Poppins', sans-serif;
        }

        .submit-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.3);
        }

        .submit-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .submit-btn.loading {
            position: relative;
            color: transparent;
        }

        .submit-btn.loading::after {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            top: 50%;
            left: 50%;
            margin-left: -8px;
            margin-top: -8px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .message {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.show {
            display: block;
        }

        .message.success {
            background-color: #d4edda;
            color: #155724;
            border-left: 4px solid #27ae60;
        }

        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            border-left: 4px solid #ff6b6b;
        }

        .message.info {
            background-color: #d1ecf1;
            color: #0c5460;
            border-left: 4px solid #667eea;
        }

        .divider {
            text-align: center;
            margin: 25px 0;
            color: #ccc;
        }

        .back-to-login {
            text-align: center;
            margin-top: 20px;
        }

        .back-to-login a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
            font-size: 14px;
        }

        .back-to-login a:hover {
            color: #764ba2;
        }

        .form-divider {
            height: 1px;
            background: #e0e0e0;
            margin: 20px 0;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .reset-container {
                padding: 25px;
            }

            .reset-header h1 {
                font-size: 24px;
            }

            .form-group input {
                padding: 10px 12px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="reset-container">
        <!-- Header -->
        <div class="reset-header">
            <div class="icon">
                <i class="fas fa-lock"></i>
            </div>
            <h1>Reset Password</h1>
            <p>Create a new password for your account</p>
        </div>

        <!-- Message -->
        <div class="message" id="message"></div>

        <!-- Reset Password Form -->
        <form id="resetPasswordForm">
            <!-- Email Field (Readonly) -->
            <div class="form-group">
                <label for="email">University Email</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email"
                    placeholder="name@vvit.net"
                    readonly
                    disabled
                >
            </div>

            <!-- Reset Token (Hidden) -->
            <input type="hidden" id="resetToken" name="resetToken">

            <!-- New Password Field -->
            <div class="form-group">
                <label for="newPassword">New Password</label>
                <div class="input-with-icon">
                    <input 
                        type="password" 
                        id="newPassword" 
                        name="newPassword"
                        placeholder="Enter new password"
                        required
                        minlength="6"
                    >
                    <i class="fas fa-eye toggle-password" onclick="togglePasswordVisibility('newPassword')"></i>
                </div>
                <div class="password-strength">
                    <div class="strength-bar">
                        <div class="strength-fill" id="strengthFill"></div>
                    </div>
                    <span id="strengthText">Too weak</span>
                </div>
            </div>

            <!-- Password Requirements -->
            <div class="password-requirements">
                <div class="requirement unmet" id="req-length">
                    <i class="fas fa-check requirement-icon"></i>
                    <span>At least 6 characters</span>
                </div>
                <div class="requirement unmet" id="req-uppercase">
                    <i class="fas fa-check requirement-icon"></i>
                    <span>One uppercase letter</span>
                </div>
                <div class="requirement unmet" id="req-number">
                    <i class="fas fa-check requirement-icon"></i>
                    <span>One number</span>
                </div>
                <div class="requirement unmet" id="req-special">
                    <i class="fas fa-check requirement-icon"></i>
                    <span>One special character (!@#$%^&*)</span>
                </div>
            </div>

            <!-- Confirm Password Field -->
            <div class="form-group" style="margin-top: 20px;">
                <label for="confirmPassword">Confirm Password</label>
                <div class="input-with-icon">
                    <input 
                        type="password" 
                        id="confirmPassword" 
                        name="confirmPassword"
                        placeholder="Confirm new password"
                        required
                    >
                    <i class="fas fa-eye toggle-password" onclick="togglePasswordVisibility('confirmPassword')"></i>
                </div>
            </div>

            <!-- Password Match Indicator -->
            <div class="password-requirements" style="margin-top: 10px;">
                <div class="requirement unmet" id="req-match">
                    <i class="fas fa-check requirement-icon"></i>
                    <span>Passwords match</span>
                </div>
            </div>

            <div class="form-divider"></div>

            <!-- Submit Button -->
            <button type="submit" class="submit-btn" id="submitBtn">
                <i class="fas fa-check" style="margin-right: 8px;"></i> Update Password
            </button>

            <!-- Back to Login -->
            <div class="back-to-login">
                <a href="index.html">
                    <i class="fas fa-arrow-left" style="margin-right: 5px;"></i> Back to Login
                </a>
            </div>
        </form>
    </div>

    <script src="config.js"></script>
    <script>
        const API_BASE = typeof API_URL !== "undefined" ? API_URL : "http://127.0.0.1:8000";
        // Check if token and email exist in URL
        window.addEventListener('load', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const token = urlParams.get('token');
            const email = urlParams.get('email');

            if (!token || !email) {
                showMessage('Invalid reset link. Please request a new password reset.', 'error');
                document.getElementById('resetPasswordForm').style.display = 'none';
                document.getElementById('submitBtn').disabled = true;
                return;
            }

            document.getElementById('email').value = email;
            document.getElementById('resetToken').value = token;
            showMessage('Enter your new password below', 'info');
        });

        // Toggle password visibility
        function togglePasswordVisibility(fieldId) {
            const field = document.getElementById(fieldId);
            const icon = event.currentTarget;
            
            if (field.type === 'password') {
                field.type = 'text';
                icon.classList.remove('fa-eye');
                icon.classList.add('fa-eye-slash');
            } else {
                field.type = 'password';
                icon.classList.remove('fa-eye-slash');
                icon.classList.add('fa-eye');
            }
        }

        // Check password strength
        document.getElementById('newPassword').addEventListener('input', function() {
            checkPasswordRequirements(this.value);
            checkPasswordMatch();
        });

        document.getElementById('confirmPassword').addEventListener('input', function() {
            checkPasswordMatch();
        });

        function checkPasswordRequirements(password) {
            const requirements = {
                length: password.length >= 6,
                uppercase: /[A-Z]/.test(password),
                number: /[0-9]/.test(password),
                special: /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(password)
            };

            // Update requirement indicators
            updateRequirement('req-length', requirements.length);
            updateRequirement('req-uppercase', requirements.uppercase);
            updateRequirement('req-number', requirements.number);
            updateRequirement('req-special', requirements.special);

            // Calculate strength
            const strengthScore = Object.values(requirements).filter(Boolean).length;
            updateStrengthBar(strengthScore, password.length);
        }

        function updateRequirement(elementId, isMet) {
            const element = document.getElementById(elementId);
            if (isMet) {
                element.classList.remove('unmet');
                element.classList.add('met');
            } else {
                element.classList.remove('met');
                element.classList.add('unmet');
            }
        }

        function updateStrengthBar(score, length) {
            const fill = document.getElementById('strengthFill');
            const text = document.getElementById('strengthText');
            const width = (score / 4) * 100;

            fill.style.width = width + '%';

            if (length === 0) {
                fill.className = 'strength-fill';
                text.textContent = '';
            } else if (score === 1) {
                fill.className = 'strength-fill strength-weak';
                text.textContent = 'Weak';
            } else if (score === 2) {
                fill.className = 'strength-fill strength-fair';
                text.textContent = 'Fair';
            } else if (score === 3) {
                fill.className = 'strength-fill strength-good';
                text.textContent = 'Good';
            } else if (score === 4) {
                fill.className = 'strength-fill strength-strong';
                text.textContent = 'Strong';
            }
        }

        function checkPasswordMatch() {
            const password = document.getElementById('newPassword').value;
            const confirm = document.getElementById('confirmPassword').value;
            const matchReq = document.getElementById('req-match');

            if (confirm.length === 0) {
                matchReq.classList.remove('met');
                matchReq.classList.add('unmet');
            } else if (password === confirm) {
                matchReq.classList.remove('unmet');
                matchReq.classList.add('met');
            } else {
                matchReq.classList.remove('met');
                matchReq.classList.add('unmet');
            }
        }

        // Show message
        function showMessage(text, type) {
            const messageEl = document.getElementById('message');
            messageEl.textContent = text;
            messageEl.className = 'message show ' + type;
        }

        // Handle form submission
        document.getElementById('resetPasswordForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const token = document.getElementById('resetToken').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const submitBtn = document.getElementById('submitBtn');

            // Validation
            if (!email || !token) {
                showMessage('Invalid reset link. Please try again.', 'error');
                return;
            }

            if (newPassword.length < 6) {
                showMessage('Password must be at least 6 characters long', 'error');
                return;
            }

            if (newPassword !== confirmPassword) {
                showMessage('Passwords do not match', 'error');
                return;
            }

            const requirements = {
                length: newPassword.length >= 6,
                uppercase: /[A-Z]/.test(newPassword),
                number: /[0-9]/.test(newPassword),
                special: /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(newPassword)
            };

            const allRequirementsMet = Object.values(requirements).every(req => req);
            if (!allRequirementsMet) {
                showMessage('Password does not meet all requirements', 'error');
                return;
            }

            // Show loading state
            submitBtn.classList.add('loading');
            submitBtn.disabled = true;

            try {
                const response = await fetch(`${API_BASE}/auth/reset-password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: email,
                        reset_token: token,
                        new_password: newPassword
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    showMessage('✓ Password reset successfully! Redirecting to login...', 'success');
                    submitBtn.classList.remove('loading');
                    submitBtn.innerHTML = '<i class="fas fa-check"></i> Password Updated';
                    
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                } else {
                    showMessage(data.detail || 'Failed to reset password', 'error');
                    submitBtn.classList.remove('loading');
                    submitBtn.disabled = false;
                }
            } catch (error) {
                console.error('Error:', error);
                showMessage('Network error. Please try again.', 'error');
                submitBtn.classList.remove('loading');
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
