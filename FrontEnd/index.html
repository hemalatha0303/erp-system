<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>College ERP - Login</title>
    <link href="style.css" rel="stylesheet" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&amp;display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="login-page">
    <div class="login-container">
      <div class="login-header">
        <h2>SIH25103 ERP System</h2>
        <p>Integrated Student Management System</p>
      </div>
      <form id="loginForm">
        <div class="form-group">
          <label for="role">Select Role</label>
          <select id="role" required="">
            <option disabled="" selected="" value="">
              -- Choose your role --
            </option>
            <option value="STUDENT">Student</option>
            <option value="FACULTY">Faculty</option>
            <option value="HOD">HOD</option>
            <option value="ADMIN">Admin</option>
          </select>
        </div>
        <div class="form-group">
          <label for="username">User ID / Email</label>
          <input id="username" placeholder="Enter Email" required="" type="text" />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input
            id="password"
            placeholder="Enter Password"
            required=""
            type="password"
          />
        </div>
        <div class="form-actions" style="justify-content: space-between">
          <a class="forgot-password" href="#" onclick="showForm('changePassword'); return false;"
            >Change Password?</a
          >
          <a class="forgot-password" href="#" onclick="showForm('forgotPassword'); return false;"
            >Forgot Password?</a
          >
        </div>
        <button class="login-btn" type="submit">Login</button>
      </form>

      <form id="changePasswordForm" style="display: none">
        <h3 style="margin-bottom: 15px; color: #333">Update Password</h3>
        <div class="form-group">
          <label>Email Address</label>
          <input
            id="cp-email"
            placeholder="Enter Email"
            required=""
            type="email"
          />
        </div>
        <div class="form-group">
          <label>Current Password</label>
          <input
            id="cp-old"
            placeholder="Old Password"
            required=""
            type="password"
          />
        </div>
        <div class="form-group">
          <label>New Password</label>
          <input
            id="cp-new"
            placeholder="New Password"
            required=""
            type="password"
          />
        </div>
        <button
          class="login-btn"
          style="background-color: #e67e22"
          type="submit"
        >
          Update
        </button>
        <div
          class="form-actions"
          style="justify-content: center; margin-top: 15px"
        >
          <a class="forgot-password" href="#" onclick="showForm('login'); return false;"
            >Back to Login</a
          >
        </div>
      </form>

      <form id="forgotPasswordForm" style="display: none">
        <h3 style="margin-bottom: 15px; color: #333">Reset Password</h3>
        <p style="color: #666; font-size: 0.9rem; margin-bottom: 15px;">Enter your university email (@vvit.net) and we'll send a password reset link to your personal email.</p>
        <div class="form-group">
          <label>University Email</label>
          <input
            id="fp-email"
            placeholder="Enter your @vvit.net email"
            required=""
            type="email"
          />
        </div>
        <button
          class="login-btn"
          style="background-color: #27ae60"
          type="submit"
        >
          Send Reset Link
        </button>
        <div
          class="form-actions"
          style="justify-content: center; margin-top: 15px"
        >
          <a class="forgot-password" href="#" onclick="showForm('login'); return false;"
            >Back to Login</a
          >
        </div>
      </form>

      <form id="resetPasswordForm" style="display: none">
        <h3 style="margin-bottom: 15px; color: #333">Create New Password</h3>
        <div class="form-group">
          <label>Email Address</label>
          <input
            id="rp-email"
            placeholder="Enter Email"
            required=""
            type="email"
            readonly=""
          />
        </div>
        <div class="form-group">
          <label>Reset Token</label>
          <input
            id="rp-token"
            placeholder="Token from reset email"
            required=""
            type="text"
          />
        </div>
        <div class="form-group">
          <label>New Password</label>
          <input
            id="rp-password"
            placeholder="Enter new password"
            required=""
            type="password"
          />
        </div>
        <div class="form-group">
          <label>Confirm Password</label>
          <input
            id="rp-password-confirm"
            placeholder="Confirm password"
            required=""
            type="password"
          />
        </div>
        <button
          class="login-btn"
          style="background-color: #27ae60"
          type="submit"
        >
          Reset Password
        </button>
        <div
          class="form-actions"
          style="justify-content: center; margin-top: 15px"
        >
          <a class="forgot-password" href="#" onclick="showForm('login'); return false;"
            >Back to Login</a
          >
        </div>
      </form>

      <div class="error-message" id="message"></div>
    </div>
    </div>
    <!-- API Configuration must be loaded FIRST -->
    <script src="config.js"></script>
    <!-- Then load main scripts -->
    <script src="script.js"></script>
  </body>
</html>
