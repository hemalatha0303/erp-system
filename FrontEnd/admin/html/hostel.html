<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Hostel | Admin</title>
    <link href="../../style.css" rel="stylesheet" />
    <link href="../css/components.css" rel="stylesheet" />
    <link href="../css/hostel.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
  </head>
  <body>
    <div id="sidebar-container"></div>
    <div class="main-content">
      <div id="header-container"></div>
      <div class="dashboard-wrapper">
        <div class="page-header">
          <h2><i class="fas fa-layer-group"></i> Hostel</h2>
        </div>
        <div class="card" style="padding:16px;">
<div class="form-group">
  <label for="alloc-roll">Alloc Roll</label>
  <input id="alloc-roll" type="text" />
</div>
<div class="form-group">
  <label for="alloc-room-id">Alloc Room Id</label>
  <input id="alloc-room-id" type="text" />
</div>
<div class="form-group">
  <label for="roomFile">Roomfile</label>
  <input id="roomFile" type="file" />
</div>
<div class="form-group">
  <label for="vacate-roll">Vacate Roll</label>
  <input id="vacate-roll" type="text" />
</div>
<div class="form-group">
  <label for="vacate-room-id">Vacate Room Id</label>
  <input id="vacate-room-id" type="text" />
</div>
</div>
      </div>
    </div>

    

    <script src="../../config.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/hostel.js"></script>
