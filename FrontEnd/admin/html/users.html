<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Users | Admin</title>
    <link href="../../style.css" rel="stylesheet" />
    <link href="../css/components.css" rel="stylesheet" />
    <link href="../css/users.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
  </head>
  <body>
    <div id="sidebar-container"></div>
    <div class="main-content">
      <div id="header-container"></div>
      <div class="dashboard-wrapper">
        <div class="page-header">
          <h2><i class="fas fa-layer-group"></i> Users</h2>
        </div>
        <div class="card" style="padding:16px;">
<div class="form-group">
  <label>Credentials List</label>
  <div id="credentials-list" class="profile-display"></div>
</div>
<div class="form-group">
  <label for="drop-zone">Drop Zone</label>
  <input id="drop-zone" type="text" />
</div>
<div class="form-group">
  <label for="file-name">File Name</label>
  <input id="file-name" type="file" />
</div>
<div class="form-group">
  <label>Processing Info</label>
  <div id="processing-info" class="profile-display"></div>
</div>
<div class="form-group">
  <label for="processing-text">Processing Text</label>
  <input id="processing-text" type="text" />
</div>
<div class="form-group">
  <label>Results Container</label>
  <div id="results-container" class="profile-display"></div>
</div>
<div class="form-group">
  <label for="userFile">Userfile</label>
  <input id="userFile" type="file" />
</div>
<div class="form-group">
  <label for="userRole">Userrole</label>
  <select id="userRole">
    <option value="">Select</option>
  </select>
</div>
</div>
      </div>
    </div>

    

    <script src="../../config.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/users.js"></script>
  </body>
</html>
