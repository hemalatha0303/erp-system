<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Dashboard | Admin</title>
    <link href="../../style.css" rel="stylesheet" />
    <link href="../css/components.css" rel="stylesheet" />
    <link href="../css/dashboard.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
  </head>
  <body>
    <div id="sidebar-container"></div>
    <div class="main-content">
      <div id="header-container"></div>
      <div class="dashboard-wrapper">
        <div class="page-header">
          <h2><i class="fas fa-layer-group"></i> Dashboard</h2>
        </div>
        <div class="card" style="padding:16px;">
<div class="form-group">
  <label>Current Date</label>
  <div id="current-date" class="profile-display"></div>
</div>
<div class="form-group">
  <label>Stat Faculty</label>
  <div id="stat-faculty" class="profile-display"></div>
</div>
<div class="form-group">
  <label>Stat Fees</label>
  <div id="stat-fees" class="profile-display"></div>
</div>
<div class="form-group">
  <label>Stat Pending</label>
  <div id="stat-pending" class="profile-display"></div>
</div>
<div class="form-group">
  <label>Stat Students</label>
  <div id="stat-students" class="profile-display"></div>
</div>
</div>
<div class="card table-card">
  <table class="data-table">
    <tbody id="activity-table"></tbody>
  </table>
</div>
      </div>
    </div>

    

    <script src="../../config.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/dashboard.js"></script>
  </body>
</html>
