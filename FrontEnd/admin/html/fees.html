<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Fees | Admin</title>
    <link href="../../style.css" rel="stylesheet" />
    <link href="../css/components.css" rel="stylesheet" />
    <link href="../css/fees.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
  </head>
  <body>
    <div id="sidebar-container"></div>
    <div class="main-content">
      <div id="header-container"></div>
      <div class="dashboard-wrapper">
        <div class="page-header">
          <h2><i class="fas fa-layer-group"></i> Fees</h2>
        </div>
        <div class="card" style="padding:16px;">
<div class="form-group">
  <label>Dd Account</label>
  <div id="dd-account" class="profile-display"></div>
</div>
<div class="form-group">
  <label for="dd-mobile">Dd Mobile</label>
  <input id="dd-mobile" type="text" />
</div>
<div class="form-group">
  <label for="ddFields">Ddfields</label>
  <input id="ddFields" type="text" />
</div>
<div class="form-group">
  <label>Fee Results</label>
  <div id="fee-results" class="profile-display"></div>
</div>
<div class="form-group">
  <label for="fs-bus">Fs Bus</label>
  <input id="fs-bus" type="text" />
</div>
<div class="form-group">
  <label for="fs-hostel">Fs Hostel</label>
  <input id="fs-hostel" type="text" />
</div>
<div class="form-group">
  <label for="fs-quota">Fs Quota</label>
  <select id="fs-quota">
    <option value="">Select</option>
  </select>
</div>
<div class="form-group">
  <label for="fs-residence">Fs Residence</label>
  <select id="fs-residence">
    <option value="">Select</option>
  </select>
</div>
<div class="form-group">
  <label for="fs-tuition">Fs Tuition</label>
  <input id="fs-tuition" type="text" />
</div>
<div class="form-group">
  <label for="fs-year">Fs Year</label>
  <select id="fs-year">
    <option value="">Select</option>
  </select>
</div>
<div class="form-group">
  <label for="pay-amount">Pay Amount</label>
  <input id="pay-amount" type="text" />
</div>
<div class="form-group">
  <label for="pay-mode">Pay Mode</label>
  <select id="pay-mode">
    <option value="">Select</option>
  </select>
</div>
<div class="form-group">
  <label for="pay-roll">Pay Roll</label>
  <input id="pay-roll" type="text" />
</div>
<div class="form-group">
  <label for="pay-type">Pay Type</label>
  <select id="pay-type">
    <option value="">Select</option>
  </select>
</div>
<div class="form-group">
  <label for="rollSearch">Rollsearch</label>
  <input id="rollSearch" type="text" />
</div>
<div class="form-group">
  <label for="upi-name">Upi Name</label>
  <input id="upi-name" type="text" />
</div>
<div class="form-group">
  <label for="upi-phone">Upi Phone</label>
  <input id="upi-phone" type="text" />
</div>
<div class="form-group">
  <label for="upi-txn-id">Upi Txn Id</label>
  <input id="upi-txn-id" type="text" />
</div>
<div class="form-group">
  <label for="upiFields">Upifields</label>
  <input id="upiFields" type="text" />
</div>
</div>
      </div>
    </div>

    

    <script src="../../config.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/fees.js"></script>
  </body>
</html>
