<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Library | Admin</title>
    <link href="../../style.css" rel="stylesheet" />
    <link href="../css/components.css" rel="stylesheet" />
    <link href="../css/library.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
  </head>
  <body>
    <div id="sidebar-container"></div>
    <div class="main-content">
      <div id="header-container"></div>
      <div class="dashboard-wrapper">
        <div class="page-header">
          <h2><i class="fas fa-layer-group"></i> Library</h2>
        </div>
        <div class="card" style="padding:16px;">
<div class="form-group">
  <label for="actual-return-date">Actual Return Date</label>
  <input id="actual-return-date" type="date" />
</div>
<div class="form-group">
  <label for="bookFile">Bookfile</label>
  <input id="bookFile" type="file" />
</div>
<div class="form-group">
  <label>Catalog List</label>
  <div id="catalog-list" class="profile-display"></div>
</div>
<div class="form-group">
  <label for="catalog-search">Catalog Search</label>
  <input id="catalog-search" type="text" />
</div>
<div class="form-group">
  <label for="issue-codes">Issue Codes</label>
  <input id="issue-codes" type="text" />
</div>
<div class="form-group">
  <label for="issue-date">Issue Date</label>
  <input id="issue-date" type="date" />
</div>
<div class="form-group">
  <label for="issue-roll">Issue Roll</label>
  <input id="issue-roll" type="text" />
</div>
<div class="form-group">
  <label for="issue-sem">Issue Sem</label>
  <select id="issue-sem">
    <option value="">Select</option>
  </select>
</div>
<div class="form-group">
  <label>Pending Books Container</label>
  <div id="pending-books-container" class="profile-display"></div>
</div>
<div class="form-group">
  <label>Pending List</label>
  <div id="pending-list" class="profile-display"></div>
</div>
<div class="form-group">
  <label for="return-due-date">Return Due Date</label>
  <input id="return-due-date" type="date" />
</div>
<div class="form-group">
  <label for="return-roll">Return Roll</label>
  <input id="return-roll" type="text" />
</div>
<div class="form-group">
  <label for="return-sem">Return Sem</label>
  <select id="return-sem">
    <option value="">Select</option>
  </select>
</div>
</div>
      </div>
    </div>

    

    <script src="../../config.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/library.js"></script>
  </body>
</html>
