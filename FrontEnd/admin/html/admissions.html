<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Admissions | Admin</title>
    <link href="../../style.css" rel="stylesheet" />
    <link href="../css/components.css" rel="stylesheet" />
    <link href="../css/admissions.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
  </head>
  <body>
    <div id="sidebar-container"></div>
    <div class="main-content">
      <div id="header-container"></div>
      <div class="dashboard-wrapper">
        <div class="page-header">
          <h2><i class="fas fa-layer-group"></i> Admissions</h2>
        </div>
        <div class="card" style="padding:16px;">
<div class="form-group">
  <label for="drop-zone">Drop Zone</label>
  <input id="drop-zone" type="text" />
</div>
<div class="form-group">
  <label for="file-name">File Name</label>
  <input id="file-name" type="file" />
</div>
<div class="form-group">
  <label for="fileInfo">Fileinfo</label>
  <input id="fileInfo" type="file" />
</div>
<div class="form-group">
  <label for="upload-status">Upload Status</label>
  <select id="upload-status">
    <option value="">Select</option>
  </select>
</div>
<div class="form-group">
  <label for="userFile">Userfile</label>
  <input id="userFile" type="file" />
</div>
<div class="form-group">
  <label for="userTypeSelect">Usertypeselect</label>
  <select id="userTypeSelect">
    <option value="">Select</option>
  </select>
</div>
</div>
      </div>
    </div>

    

    <script src="../../config.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/admissions.js"></script>
  </body>
</html>
