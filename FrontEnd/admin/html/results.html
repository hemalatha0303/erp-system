<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Results | Admin</title>
    <link href="../../style.css" rel="stylesheet" />
    <link href="../css/components.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
  </head>
  <body>
    <div id="sidebar-container"></div>
    <div class="main-content">
      <div id="header-container"></div>
      <div class="dashboard-wrapper">
        <div class="page-header">
          <h2><i class="fas fa-layer-group"></i> Results</h2>
        </div>
        <div class="card" style="padding:16px;">
<div class="form-group">
  <label for="file-name">File Name</label>
  <input id="file-name" type="file" />
</div>
<div class="form-group">
  <label for="res-batch">Res Batch</label>
  <select id="res-batch">
    <option value="">Select</option>
  </select>
</div>
<div class="form-group">
  <label for="res-branch">Res Branch</label>
  <select id="res-branch">
    <option value="">Select</option>
  </select>
</div>
<div class="form-group">
  <label for="res-section">Res Section</label>
  <select id="res-section">
    <option value="">Select</option>
  </select>
</div>
<div class="form-group">
  <label for="res-sem">Res Sem</label>
  <select id="res-sem">
    <option value="">Select</option>
  </select>
</div>
<div class="form-group">
  <label for="resFile">Resfile</label>
  <input id="resFile" type="file" />
</div>
</div>
      </div>
    </div>

    

    <script src="../../config.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/results.js"></script>
  </body>
</html>
