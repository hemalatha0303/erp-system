<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Dashboard | Faculty</title>
    <link href="../../style.css" rel="stylesheet" />
    <link href="../css/components.css" rel="stylesheet" />
    <link href="../css/faculty.css" rel="stylesheet" />
    <link href="../css/dashboard.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
  </head>
  <body>
    <div id="sidebar-container"></div>
    <div class="main-content">
      <div id="header-container"></div>
      <div class="dashboard-wrapper">
        <div class="page-header">
          <h2><i class="fas fa-layer-group"></i> Dashboard</h2>
        </div>
        <div class="card" style="padding:16px;">
<div class="form-group">
  <label for="fac-name">Fac Name</label>
  <input id="fac-name" type="text" />
</div>
<div class="form-group">
  <label for="p-exp">P Exp</label>
  <input id="p-exp" type="text" />
</div>
<div class="form-group">
  <label for="p-name">P Name</label>
  <input id="p-name" type="text" />
</div>
<div class="form-group">
  <label for="p-phone">P Phone</label>
  <input id="p-phone" type="text" />
</div>
<div class="form-group">
  <label for="p-qual">P Qual</label>
  <input id="p-qual" type="text" />
</div>
<div class="form-group">
  <label>Tt Image</label>
  <img id="tt-image" alt="Tt Image" style="max-width:100%;" />
</div>
<div class="form-group">
  <label for="tt-msg">Tt Msg</label>
  <input id="tt-msg" type="text" />
</div>
</div>
      </div>
    </div>

    

    <script src="../../config.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/dashboard.js"></script>
  </body>
</html>
