<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Student Lookup</title>
    <link href="../../style.css" rel="stylesheet" />
    <link href="../css/components.css" rel="stylesheet" />
    <link href="../css/students.css" rel="stylesheet" />
    <link href="../css/faculty.css" rel="stylesheet" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="sidebar-container"></div>
    <div class="main-content">
      <div id="header-container"></div>
      <div class="dashboard-wrapper">
        <div class="page-header"><h2>Student Lookup</h2></div>
        
        <div class="card search-card">
          <div class="form-group">
            <label>Enter Roll Number</label>
            <div class="input-with-btn">
              <input id="lookup-roll" placeholder="Enter Roll No" type="text" />
              <button class="primary-btn" onclick="lookupStudent()">
                <i class="fas fa-search"></i> Search
              </button>
            </div>
          </div>
        </div>
        
        <div class="card table-card" id="lookup-result" style="display: none">
          <table class="data-table">
            <thead>
              <tr>
                <th>Roll No</th>
                <th>Name</th>
                <th>Branch</th>
                <th>Year / Sem</th>
                <th>Section</th>
                <th>Phone</th>
                <th>Status</th>
                <th>Fee Status</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="lookup-body"></tbody>
          </table>
        </div>
      </div>
    </div>

    <div id="alertModal" class="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center;">
      <div class="modal-content" style="background:#fff; padding:25px; border-radius:8px; width:450px; max-width:90%; box-shadow: 0 4px 15px rgba(0,0,0,0.2);">
        <h3 style="margin-bottom: 15px; color: #333; border-bottom: 1px solid #eee; padding-bottom: 10px;">
          <i class="fas fa-exclamation-triangle" style="color: #e74c3c;"></i> Send Student Alert
        </h3>
        
        <div class="form-group" style="margin-top:15px;">
          <label style="display:block; font-weight:600; margin-bottom:5px; color:#555;">Student Roll No</label>
          <input type="text" id="alert-target-roll" readonly style="width:100%; padding:10px; border: 1px solid #ccc; border-radius: 4px; background: #f0f0f0; color:#555;">
        </div>
        
        <div class="form-group" style="margin-top:15px;">
          <label style="display:block; font-weight:600; margin-bottom:5px; color:#555;">Severity</label>
          <select id="alert-severity" style="width:100%; padding:10px; border: 1px solid #ccc; border-radius: 4px;">
            <option value="INFO">Info (Blue)</option>
            <option value="WARNING" selected>Warning (Yellow)</option>
            <option value="CRITICAL">Critical (Red)</option>
          </select>
        </div>
        
        <div class="form-group" style="margin-top:15px;">
          <label style="display:block; font-weight:600; margin-bottom:5px; color:#555;">Title</label>
          <input type="text" id="alert-title" placeholder="e.g., Low Attendance Warning" style="width:100%; padding:10px; border: 1px solid #ccc; border-radius: 4px;">
        </div>
        
        <div class="form-group" style="margin-top:15px;">
          <label style="display:block; font-weight:600; margin-bottom:5px; color:#555;">Message</label>
          <textarea id="alert-message" rows="4" style="width:100%; padding:10px; border: 1px solid #ccc; border-radius: 4px; resize:vertical;" placeholder="Type your message here..."></textarea>
        </div>
        
        <div style="margin-top:25px; display:flex; justify-content:space-between;">
          <button class="secondary-btn" onclick="closeAlertModal()" style="padding: 10px 20px;">Cancel</button>
          <button class="primary-btn" onclick="sendStudentAlert()" style="padding: 10px 20px; background-color: #e74c3c; border:none;">Send Alert</button>
        </div>
      </div>
    </div>

    <script src="../js/main.js"></script>
    <script src="../js/students.js"></script>
  </body>
</html>
</html>
