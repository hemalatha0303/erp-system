<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Profile | Faculty</title>
    <link href="../../style.css" rel="stylesheet" />
    <link href="../css/components.css" rel="stylesheet" />
    <link href="../css/faculty.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
  </head>
  <body>
    <div id="sidebar-container"></div>
    <div class="main-content">
      <div id="header-container"></div>
      <div class="dashboard-wrapper">
        <div class="page-header">
          <h2><i class="fas fa-layer-group"></i> Profile</h2>
        </div>
        <div class="card" style="padding:16px;">
<div class="form-group">
  <label for="pf-addr">Pf Addr</label>
  <input id="pf-addr" type="text" />
</div>
<div class="form-group">
  <label for="pf-dept">Pf Dept</label>
  <select id="pf-dept">
    <option value="">Select</option>
  </select>
</div>
<div class="form-group">
  <label for="pf-email">Pf Email</label>
  <input id="pf-email" type="text" />
</div>
<div class="form-group">
  <label for="pf-exp">Pf Exp</label>
  <input id="pf-exp" type="text" />
</div>
<div class="form-group">
  <label for="pf-fname">Pf Fname</label>
  <input id="pf-fname" type="text" />
</div>
<div class="form-group">
  <label for="pf-lname">Pf Lname</label>
  <input id="pf-lname" type="text" />
</div>
<div class="form-group">
  <label for="pf-mobile">Pf Mobile</label>
  <input id="pf-mobile" type="text" />
</div>
<div class="form-group">
  <label for="pf-persemail">Pf Persemail</label>
  <select id="pf-persemail">
    <option value="">Select</option>
  </select>
</div>
<div class="form-group">
  <label for="pf-qual">Pf Qual</label>
  <input id="pf-qual" type="text" />
</div>
<div class="form-group">
  <label for="pf-subcode">Pf Subcode</label>
  <input id="pf-subcode" type="text" />
</div>
<div class="form-group">
  <label for="pf-subname">Pf Subname</label>
  <input id="pf-subname" type="text" />
</div>
</div>
      </div>
    </div>

    

    <script src="../../config.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/profile.js"></script>
  </body>
</html>
