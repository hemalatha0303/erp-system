<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>My Profile - Faculty</title>
    <link href="../../style.css" rel="stylesheet" />
    <link href="../css/components.css" rel="stylesheet" />
    <link href="../css/faculty.css" rel="stylesheet" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
    <style>
      .profile-form-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }
      .full-width {
        grid-column: span 2;
      }
      @media (max-width: 768px) {
        .profile-form-grid {
          grid-template-columns: 1fr;
        }
        .full-width {
          grid-column: span 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="sidebar-container"></div>
    <div class="main-content">
      <div id="header-container"></div>
      <div class="dashboard-wrapper">
        <div class="page-header"><h2>My Profile</h2></div>
        <div class="card">
          <div class="profile-form-grid">
            <div class="form-group">
              <label>First Name</label>
              <div class="profile-display" id="pf-fname">-</div>
            </div>
            <div class="form-group">
              <label>Last Name</label>
              <div class="profile-display" id="pf-lname">-</div>
            </div>
            <div class="form-group">
              <label>Email</label>
              <div class="profile-display" id="pf-email">-</div>
            </div>
            <div class="form-group">
              <label>Personal Email</label>
              <div class="profile-display" id="pf-persemail">-</div>
            </div>
            <div class="form-group">
              <label>Mobile Number</label>
              <div class="profile-display" id="pf-mobile">-</div>
            </div>
            <div class="form-group">
              <label>Department / Branch</label>
              <div class="profile-display" id="pf-dept">-</div>
            </div>
            <div class="form-group">
              <label>Subject Code</label>
              <div class="profile-display" id="pf-subcode">-</div>
            </div>
            <div class="form-group">
              <label>Subject Name</label>
              <div class="profile-display" id="pf-subname">-</div>
            </div>
            <div class="form-group">
              <label>Qualification</label>
              <div class="profile-display" id="pf-qual">-</div>
            </div>
            <div class="form-group">
              <label>Experience (Years)</label>
              <div class="profile-display" id="pf-exp">-</div>
            </div>
            <div class="form-group full-width">
              <label>Address</label>
              <div class="profile-display" id="pf-addr">-</div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script src="../js/main.js"></script>
    <script src="../js/profile.js"></script>
  </body>
</html>
