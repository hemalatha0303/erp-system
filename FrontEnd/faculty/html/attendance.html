<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Attendance | Faculty</title>
    <link href="../../style.css" rel="stylesheet" />
    <link href="../css/components.css" rel="stylesheet" />
    <link href="../css/faculty.css" rel="stylesheet" />
    <link href="../css/attendance.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
  </head>
  <body>
    <div id="sidebar-container"></div>
    <div class="main-content">
      <div id="header-container"></div>
      <div class="dashboard-wrapper">
        <div class="page-header">
          <h2><i class="fas fa-layer-group"></i> Attendance</h2>
        </div>
        <div class="card" style="padding:16px;">
<div class="form-group">
  <label for="att-batch">Att Batch</label>
  <select id="att-batch">
    <option value="">Select</option>
  </select>
</div>
<div class="form-group">
  <label for="att-branch">Att Branch</label>
  <select id="att-branch">
    <option value="">Select</option>
  </select>
</div>
<div class="form-group">
  <label for="att-date">Att Date</label>
  <input id="att-date" type="date" />
</div>
<div class="form-group">
  <label>Att List</label>
  <div id="att-list" class="profile-display"></div>
</div>
<div class="form-group">
  <label for="att-period">Att Period</label>
  <input id="att-period" type="text" />
</div>
<div class="form-group">
  <label for="att-sec">Att Sec</label>
  <select id="att-sec">
    <option value="">Select</option>
  </select>
</div>
<div class="form-group">
  <label for="att-sem">Att Sem</label>
  <select id="att-sem">
    <option value="">Select</option>
  </select>
</div>
<div class="form-group">
  <label for="att-sub">Att Sub</label>
  <input id="att-sub" type="text" />
</div>
<div class="form-group">
  <label for="att-summary">Att Summary</label>
  <input id="att-summary" type="text" />
</div>
</div>
<div class="card table-card">
  <table class="data-table">
    <tbody id="att-table-container"></tbody>
  </table>
</div>
      </div>
    </div>

    

    <script src="../../config.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/attendance.js"></script>
  </body>
</html>
