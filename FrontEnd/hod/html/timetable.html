<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Timetable | Hod</title>
    <link href="../../style.css" rel="stylesheet" />
    <link href="../css/components.css" rel="stylesheet" />
    <link href="../css/hod.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
  </head>
  <body>
    <div id="sidebar-container"></div>
    <div class="main-content">
      <div id="header-container"></div>
      <div class="dashboard-wrapper">
        <div class="page-header">
          <h2><i class="fas fa-layer-group"></i> Timetable</h2>
        </div>
        <div class="card" style="padding:16px;">
<div class="form-group">
  <label for="tt-branch">Tt Branch</label>
  <select id="tt-branch">
    <option value="">Select</option>
  </select>
</div>
<div class="form-group">
  <label for="tt-fac-email">Tt Fac Email</label>
  <input id="tt-fac-email" type="text" />
</div>
<div class="form-group">
  <label for="tt-file">Tt File</label>
  <input id="tt-file" type="file" />
</div>
<div class="form-group">
  <label for="tt-sec">Tt Sec</label>
  <select id="tt-sec">
    <option value="">Select</option>
  </select>
</div>
<div class="form-group">
  <label for="tt-sem">Tt Sem</label>
  <select id="tt-sem">
    <option value="">Select</option>
  </select>
</div>
<div class="form-group">
  <label for="tt-type">Tt Type</label>
  <select id="tt-type">
    <option value="">Select</option>
  </select>
</div>
<div class="form-group">
  <label for="tt-year">Tt Year</label>
  <select id="tt-year">
    <option value="">Select</option>
  </select>
</div>
</div>
      </div>
    </div>

    

    <script src="../../config.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/timetable.js"></script>
  </body>
</html>
