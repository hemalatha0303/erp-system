<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Notifications | Hod</title>
    <link href="../../style.css" rel="stylesheet" />
    <link href="../css/components.css" rel="stylesheet" />
    <link href="../css/hod.css" rel="stylesheet" />
    <link href="../css/notifications.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
  </head>
  <body>
    <div id="sidebar-container"></div>
    <div class="main-content">
      <div id="header-container"></div>
      <div class="dashboard-wrapper">
        <div class="page-header">
          <h2><i class="fas fa-layer-group"></i> Notifications</h2>
        </div>
        <div class="card" style="padding:16px;">
<div class="form-group">
  <label for="batch-group">Batch Group</label>
  <select id="batch-group">
    <option value="">Select</option>
  </select>
</div>
<div class="form-group">
  <label for="faculty-group">Faculty Group</label>
  <input id="faculty-group" type="text" />
</div>
<form id="hod-notification-form" class="card" style="padding:16px;">
  <div class="form-group">
    <label>Hod Notification Form</label>
    <div>Form container</div>
  </div>
</form>
<div class="form-group">
  <label>Inbox View</label>
  <div id="inbox-view" class="profile-display"></div>
</div>
<div class="form-group">
  <label for="n-batch">N Batch</label>
  <select id="n-batch">
    <option value="">Select</option>
  </select>
</div>
<div class="form-group">
  <label for="n-branch-faculty">N Branch Faculty</label>
  <select id="n-branch-faculty">
    <option value="">Select</option>
  </select>
</div>
<div class="form-group">
  <label for="n-branch-student">N Branch Student</label>
  <select id="n-branch-student">
    <option value="">Select</option>
  </select>
</div>
<div class="form-group">
  <label for="n-category">N Category</label>
  <select id="n-category">
    <option value="">Select</option>
  </select>
</div>
<div class="form-group">
  <label>N Message</label>
  <div id="n-message" class="profile-display"></div>
</div>
<div class="form-group">
  <label for="n-priority">N Priority</label>
  <select id="n-priority">
    <option value="">Select</option>
  </select>
</div>
<div class="form-group">
  <label for="n-section">N Section</label>
  <select id="n-section">
    <option value="">Select</option>
  </select>
</div>
<div class="form-group">
  <label for="n-target">N Target</label>
  <select id="n-target">
    <option value="">Select</option>
  </select>
</div>
<div class="form-group">
  <label for="n-title">N Title</label>
  <input id="n-title" type="text" />
</div>
<div class="form-group">
  <label>Notification List</label>
  <div id="notification-list" class="profile-display"></div>
</div>
<div class="form-group">
  <label for="send-view">Send View</label>
  <input id="send-view" type="text" />
</div>
<div class="form-group">
  <label for="student-group">Student Group</label>
  <input id="student-group" type="text" />
</div>
<div class="form-group">
  <label>Tab Inbox</label>
  <div id="tab-inbox" class="profile-display"></div>
</div>
<div class="form-group">
  <label for="tab-send">Tab Send</label>
  <input id="tab-send" type="text" />
</div>
</div>
      </div>
    </div>

    

    <script src="../../config.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/notifications.js"></script>
  </body>
</html>
