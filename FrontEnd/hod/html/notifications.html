<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>HOD Notifications</title>
    <link href="../../style.css" rel="stylesheet" />
    <link href="../css/components.css" rel="stylesheet" />
    <link href="../css/notifications.css" rel="stylesheet" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="sidebar-container"></div>
    <div class="main-content">
      <div id="header-container"></div>
      <div class="dashboard-wrapper">
        <div class="page-header">
          <h2><i class="fas fa-bell"></i> Notifications</h2>
        </div>

        <div class="category-grid">
          <div class="category-card active" id="tab-send" onclick="showTab('send')">
            <h4><i class="fas fa-paper-plane"></i> Send Notifications</h4>
            <span>Broadcast to Faculty/Students</span>
          </div>
          <div class="category-card" id="tab-inbox" onclick="showTab('inbox')">
            <h4><i class="fas fa-inbox"></i> Inbox</h4>
            <span>Messages from Admin</span>
          </div>
        </div>

        <div id="send-view" class="form-card">
          <form
            id="hod-notification-form"
            onsubmit="
              event.preventDefault();
              sendHodNotification();
            "
          >
            <div class="form-group">
              <label>Title</label>
              <input id="n-title" required="" type="text" />
            </div>
            <div class="grid-2">
              <div class="form-group">
                <label>Category</label>
                <select id="n-category">
                  <option value="GENERAL">General</option>
                  <option value="ACADEMIC">Academic / Exam</option>
                  <option value="FEES">Fees / Accounts</option>
                  <option value="HOSTEL">Hostel</option>
                  <option value="LIBRARY">Library</option>
                  <option value="EVENT">Event / Holiday</option>
                </select>
              </div>
              <div class="form-group">
                <label>Priority</label>
                <select id="n-priority">
                  <option value="NORMAL">Normal</option>
                  <option value="IMPORTANT">Important</option>
                  <option value="CRITICAL">Critical (High Alert)</option>
                </select>
              </div>
            </div>
            <div class="grid-2">
              <div class="form-group">
                <label>Target Audience</label>
                <select id="n-target" onchange="toggleTargetFilters()">
                  <option value="ALL">All Users</option>
                  <option value="FACULTY">Faculty</option>
                  <option value="STUDENT">Students</option>
                </select>
              </div>
              <div class="form-group" id="batch-group" style="display: none">
                <label>Batch</label>
                <input id="n-batch" placeholder="e.g., 2022-26" type="text" />
              </div>
            </div>
            <div class="grid-2" id="faculty-group" style="display: none">
              <div class="form-group">
                <label>Branch</label>
                <select id="n-branch-faculty">
                  <option value="ALL">All Branches</option>
                  <option value="CIC">CIC</option>
                  <option value="CSM">CSM</option>
                  <option value="CSE">CSE</option>
                  <option value="IT">IT</option>
                  <option value="ECE">ECE</option>
                </select>
              </div>
              <div class="form-group"></div>
            </div>
            <div class="grid-2" id="student-group" style="display: none">
              <div class="form-group">
                <label>Branch</label>
                <select id="n-branch-student">
                  <option value="ALL">All Branches</option>
                  <option value="CIC">CIC</option>
                  <option value="CSM">CSM</option>
                  <option value="CSE">CSE</option>
                  <option value="IT">IT</option>
                  <option value="ECE">ECE</option>
                </select>
              </div>
              <div class="form-group">
                <label>Section</label>
                <select id="n-section">
                  <option value="ALL">All Sections</option>
                  <option value="A">A</option>
                  <option value="B">B</option>
                  <option value="C">C</option>
                </select>
              </div>
            </div>
            <div class="form-group">
              <label>Message Content</label>
              <textarea
                id="n-message"
                placeholder="Type your message here..."
                required=""
              ></textarea>
            </div>
            <button class="login-btn" type="submit">
              <i class="fas fa-paper-plane"></i> Send Notification
            </button>
          </form>
        </div>

        <div id="inbox-view" style="display: none;">
          <div class="filter-tabs">
            <button class="tab-btn active" onclick="filterInbox('ALL', this)">All</button>
            <button class="tab-btn" onclick="filterInbox('ACADEMIC', this)">Academic</button>
            <button class="tab-btn" onclick="filterInbox('FEES', this)">Fees</button>
            <button class="tab-btn" onclick="filterInbox('HOSTEL', this)">Hostel</button>
            <button class="tab-btn" onclick="filterInbox('EVENT', this)">Events</button>
            <button class="tab-btn" onclick="filterInbox('GENERAL', this)">General</button>
          </div>
          <div class="notif-container" id="notification-list"></div>
        </div>
      </div>
    </div>
    <script src="../js/main.js"></script>
    <script src="../js/notifications.js"></script>
  </body>
</html>
