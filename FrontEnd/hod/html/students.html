<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Students | Hod</title>
    <link href="../../style.css" rel="stylesheet" />
    <link href="../css/components.css" rel="stylesheet" />
    <link href="../css/hod.css" rel="stylesheet" />
    <link href="../css/students.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
  </head>
  <body>
    <div id="sidebar-container"></div>
    <div class="main-content">
      <div id="header-container"></div>
      <div class="dashboard-wrapper">
        <div class="page-header">
          <h2><i class="fas fa-layer-group"></i> Students</h2>
        </div>
        <div class="card" style="padding:16px;">
<div class="form-group">
  <label>Alert Message</label>
  <div id="alert-message" class="profile-display"></div>
</div>
<div class="form-group">
  <label for="alert-severity">Alert Severity</label>
  <input id="alert-severity" type="text" />
</div>
<div class="form-group">
  <label for="alert-target-roll">Alert Target Roll</label>
  <select id="alert-target-roll">
    <option value="">Select</option>
  </select>
</div>
<div class="form-group">
  <label for="alert-title">Alert Title</label>
  <input id="alert-title" type="text" />
</div>
<div class="form-group">
  <label>Analytics Charts</label>
  <canvas id="analytics-charts" height="180"></canvas>
</div>
<div class="form-group">
  <label>Attendancechart</label>
  <canvas id="attendanceChart" height="180"></canvas>
</div>
<div class="form-group">
  <label for="lookup-btn">Lookup Btn</label>
  <input id="lookup-btn" type="text" />
</div>
<div class="form-group">
  <label for="lookup-result-content">Lookup Result Content</label>
  <input id="lookup-result-content" type="text" />
</div>
<div class="form-group">
  <label for="lookup-roll">Lookup Roll</label>
  <input id="lookup-roll" type="text" />
</div>
<div class="form-group">
  <label>Markschart</label>
  <canvas id="marksChart" height="180"></canvas>
</div>
<div class="form-group">
  <label for="risk-explanation">Risk Explanation</label>
  <input id="risk-explanation" type="text" />
</div>
<div class="form-group">
  <label for="risk-factors">Risk Factors</label>
  <input id="risk-factors" type="text" />
</div>
<div class="form-group">
  <label>Risk Level Container</label>
  <div id="risk-level-container" class="profile-display"></div>
</div>
<div class="form-group">
  <label for="risk-student-name">Risk Student Name</label>
  <input id="risk-student-name" type="text" />
</div>
<div class="form-group">
  <label for="st-batch">St Batch</label>
  <select id="st-batch">
    <option value="">Select</option>
  </select>
</div>
<div class="form-group">
  <label for="st-branch">St Branch</label>
  <select id="st-branch">
    <option value="">Select</option>
  </select>
</div>
<div class="form-group">
  <label>St Results</label>
  <div id="st-results" class="profile-display"></div>
</div>
<div class="form-group">
  <label for="st-sec">St Sec</label>
  <select id="st-sec">
    <option value="">Select</option>
  </select>
</div>
<div class="form-group">
  <label for="st-sem">St Sem</label>
  <select id="st-sem">
    <option value="">Select</option>
  </select>
</div>
<div class="form-group">
  <label for="student-details-card">Student Details Card</label>
  <input id="student-details-card" type="text" />
</div>
<div class="form-group">
  <label>Student List</label>
  <div id="student-list" class="profile-display"></div>
</div>
</div>
      </div>
    </div>

    <div id="alertModal" class="modal" style="display:none;"></div>
    <div id="riskModal" class="modal" style="display:none;"></div>

    <script src="../../config.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/students.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </body>
</html>
