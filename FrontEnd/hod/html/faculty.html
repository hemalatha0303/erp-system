<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Faculty Management</title>
    <link href="../../style.css" rel="stylesheet" />
    <link href="../css/components.css" rel="stylesheet" />
    <link href="../css/faculty.css" rel="stylesheet" />
    <link href="../css/hod.css" rel="stylesheet" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="sidebar-container"></div>
    <div id="header-container"></div>
    <div class="main-content">
      <div class="dashboard-wrapper">
        <div class="page-header"><h2>Faculty Lookup</h2></div>
        <div class="card filters-row">
          <div style="display: flex; gap: 10px; flex-grow: 1">
            <input
              id="fac-email-search"
              placeholder="Enter Faculty Email"
              style="flex-grow: 1"
              type="email"
            />
            <button class="primary-btn" onclick="searchFacultyByEmail()">
              <i class="fas fa-search"></i> Search
            </button>
          </div>
          <div
            style="
              border-left: 2px solid #eee;
              padding-left: 15px;
              margin-left: 5px;
            "
          >
            <button class="primary-btn" onclick="fetchAllFaculty()">
              <i class="fas fa-list"></i> View All Faculty
            </button>
          </div>
        </div>
        <div id="single-faculty-view" style="display: none">
          <div class="card profile-card">
            <div class="profile-header">
              <div class="profile-icon"><i class="fas fa-user-tie"></i></div>
              <div class="profile-info">
                <h3 id="d-name">--</h3>
                <p id="d-desig" style="color: #666">--</p>
              </div>
            </div>
            <div class="profile-grid">
              <div class="p-item">
                <strong>ID:</strong> <span id="d-id">--</span>
              </div>
              <div class="p-item">
                <strong>Email:</strong> <span id="d-email">--</span>
              </div>
              <div class="p-item">
                <strong>Mobile:</strong> <span id="d-mobile">--</span>
              </div>
              <div class="p-item">
                <strong>Experience:</strong> <span id="d-exp">--</span>
              </div>
            </div>
            <div class="profile-full">
              <strong>Address:</strong> <span id="d-address">--</span>
            </div>
            <button
              class="alert-btn"
              onclick="closeDetailView()"
              style="margin-top: 20px"
            >
              Back to Search
            </button>
            <button
              class="primary-btn"
              onclick="openFacultyAlertModal()"
              style="margin-top: 20px; margin-left: 10px;"
            >
              <i class="fas fa-bell"></i> Send Alert
            </button>
          </div>
        </div>
        <div
          class="card table-card"
          id="all-faculty-view"
          style="display: none"
        >
          <h3
            style="
              padding: 15px 20px 0;
              margin: 0;
              font-size: 1.1rem;
              color: #444;
            "
          >
            All Faculty Members
          </h3>
          <table class="data-table">
            <thead>
              <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Qualification</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="faculty-list"></tbody>
          </table>
        </div>
      </div>
    </div>
    <script src="../js/main.js"></script>
    <script src="../js/faculty.js"></script>
    <style></style>

    <div id="facultyAlertModal" class="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center;">
      <div class="modal-content" style="background:#fff; padding:25px; border-radius:8px; width:450px; max-width:90%; box-shadow: 0 4px 15px rgba(0,0,0,0.2);">
        <h3 style="margin-bottom: 15px; color: #333; border-bottom: 1px solid #eee; padding-bottom: 10px;">
          <i class="fas fa-bell" style="color: #0d47a1;"></i> Send Faculty Alert
        </h3>
        
        <div class="form-group" style="margin-top:15px;">
          <label style="display:block; font-weight:600; margin-bottom:5px; color:#555;">Faculty Email</label>
          <input type="text" id="alert-faculty-email" readonly style="width:100%; padding:10px; border: 1px solid #ccc; border-radius: 4px; background: #f0f0f0; color:#555;">
        </div>
        
        <div class="form-group" style="margin-top:15px;">
          <label style="display:block; font-weight:600; margin-bottom:5px; color:#555;">Priority</label>
          <select id="alert-faculty-priority" style="width:100%; padding:10px; border: 1px solid #ccc; border-radius: 4px;">
            <option value="NORMAL">Normal</option>
            <option value="IMPORTANT">Important</option>
            <option value="CRITICAL">Critical</option>
          </select>
        </div>
        
        <div class="form-group" style="margin-top:15px;">
          <label style="display:block; font-weight:600; margin-bottom:5px; color:#555;">Title</label>
          <input type="text" id="alert-faculty-title" placeholder="e.g., Meeting Reminder" style="width:100%; padding:10px; border: 1px solid #ccc; border-radius: 4px;">
        </div>
        
        <div class="form-group" style="margin-top:15px;">
          <label style="display:block; font-weight:600; margin-bottom:5px; color:#555;">Message</label>
          <textarea id="alert-faculty-message" rows="4" style="width:100%; padding:10px; border: 1px solid #ccc; border-radius: 4px; resize:vertical;" placeholder="Type your message here..."></textarea>
        </div>
        
        <div style="margin-top:25px; display:flex; justify-content:space-between;">
          <button class="secondary-btn" onclick="closeFacultyAlertModal()" style="padding: 10px 20px;">Cancel</button>
          <button class="primary-btn" onclick="sendFacultyAlert()" style="padding: 10px 20px;">Send Alert</button>
        </div>
      </div>
    </div>
  </body>
</html>
