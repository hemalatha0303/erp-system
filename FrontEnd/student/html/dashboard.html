<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Dashboard | Student</title>
    <link href="../../style.css" rel="stylesheet" />
    <link href="../css/components.css" rel="stylesheet" />
    <link href="../css/dashboard.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
  </head>
  <body>
    <div id="sidebar-container"></div>
    <div class="main-content">
      <div id="header-container"></div>
      <div class="dashboard-wrapper">
        <div class="page-header">
          <h2><i class="fas fa-layer-group"></i> Dashboard</h2>
        </div>
        <div class="card" style="padding:16px;">
<div class="form-group">
  <label>Ai Alert Box</label>
  <div id="ai-alert-box" class="profile-display"></div>
</div>
<div class="form-group">
  <label for="ai-attendance-msg">Ai Attendance Msg</label>
  <input id="ai-attendance-msg" type="text" />
</div>
<div class="form-group">
  <label for="ai-icon">Ai Icon</label>
  <input id="ai-icon" type="text" />
</div>
<div class="form-group">
  <label for="ai-title">Ai Title</label>
  <input id="ai-title" type="text" />
</div>
<div class="form-group">
  <label for="attendance-circle">Attendance Circle</label>
  <input id="attendance-circle" type="text" />
</div>
<div class="form-group">
  <label>Current Date</label>
  <div id="current-date" class="profile-display"></div>
</div>
<div class="form-group">
  <label for="profile-branch">Profile Branch</label>
  <input id="profile-branch" type="file" />
</div>
<div class="form-group">
  <label for="profile-name">Profile Name</label>
  <input id="profile-name" type="file" />
</div>
<div class="form-group">
  <label for="profile-teacher">Profile Teacher</label>
  <input id="profile-teacher" type="file" />
</div>
<div class="form-group">
  <label for="profile-year">Profile Year</label>
  <input id="profile-year" type="file" />
</div>
<div class="form-group">
  <label>Tt Image</label>
  <img id="tt-image" alt="Tt Image" style="max-width:100%;" />
</div>
<div class="form-group">
  <label for="tt-msg">Tt Msg</label>
  <input id="tt-msg" type="text" />
</div>
<div class="form-group">
  <label for="welcome-name">Welcome Name</label>
  <input id="welcome-name" type="text" />
</div>
</div>
      </div>
    </div>

    

    <script src="../../config.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/dashboard.js"></script>
  </body>
</html>
