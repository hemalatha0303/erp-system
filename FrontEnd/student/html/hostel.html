<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Hostel | Student</title>
    <link href="../../style.css" rel="stylesheet" />
    <link href="../css/components.css" rel="stylesheet" />
    <link href="../css/hostel.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
  </head>
  <body>
    <div id="sidebar-container"></div>
    <div class="main-content">
      <div id="header-container"></div>
      <div class="dashboard-wrapper">
        <div class="page-header">
          <h2><i class="fas fa-layer-group"></i> Hostel</h2>
        </div>
        <div class="card" style="padding:16px;">
<div class="form-group">
  <label for="h-bed">H Bed</label>
  <input id="h-bed" type="text" />
</div>
<div class="form-group">
  <label for="h-block">H Block</label>
  <input id="h-block" type="text" />
</div>
<div class="form-group">
  <label for="h-room">H Room</label>
  <input id="h-room" type="text" />
</div>
<div class="form-group">
  <label for="h-type">H Type</label>
  <select id="h-type">
    <option value="">Select</option>
  </select>
</div>
<div class="form-group">
  <label>Roommate List</label>
  <div id="roommate-list" class="profile-display"></div>
</div>
<div class="form-group">
  <label for="roommate-section">Roommate Section</label>
  <select id="roommate-section">
    <option value="">Select</option>
  </select>
</div>
<div class="form-group">
  <label for="status-badge">Status Badge</label>
  <select id="status-badge">
    <option value="">Select</option>
  </select>
</div>
</div>
      </div>
    </div>

    

    <script src="../../config.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/hostel.js"></script>
  </body>
</html>
