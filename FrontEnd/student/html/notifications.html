<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Notifications - Student</title>
    <link href="../../style.css" rel="stylesheet" />
    <link href="../css/components.css" rel="stylesheet" />
    <link href="../css/notifications.css" rel="stylesheet" />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="sidebar-container"></div>
    <div class="main-content">
      <div id="header-container"></div>
      <div class="dashboard-wrapper">
        <div class="page-header">
          <h2>Notifications & Alerts</h2>
        </div>
        
        <div class="filter-tabs">
          <button class="tab-btn active" onclick="filterNotifications('ALL', this)">
            All
          </button>
          <button class="tab-btn" onclick="filterNotifications('ALERT', this)" style="color: #c62828;">
            <i class="fas fa-exclamation-triangle"></i> Alerts
          </button>
          <button class="tab-btn" onclick="filterNotifications('ACADEMIC', this)">
            Academic
          </button>
          <button class="tab-btn" onclick="filterNotifications('FEES', this)">
            Fees
          </button>
          <button class="tab-btn" onclick="filterNotifications('HOSTEL', this)">
            Hostel
          </button>
          <button class="tab-btn" onclick="filterNotifications('EVENT', this)">
            Events
          </button>
        </div>
        
        <div class="notif-container" id="notification-list"></div>
      </div>
    </div>
    <script src="../js/main.js"></script>
    <script src="../js/notifications.js"></script>
  </body>
</html>
