<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Library | Student</title>
    <link href="../../style.css" rel="stylesheet" />
    <link href="../css/components.css" rel="stylesheet" />
    <link href="../css/library.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
  </head>
  <body>
    <div id="sidebar-container"></div>
    <div class="main-content">
      <div id="header-container"></div>
      <div class="dashboard-wrapper">
        <div class="page-header">
          <h2><i class="fas fa-layer-group"></i> Library</h2>
        </div>
        <div class="card" style="padding:16px;">
<div class="form-group">
  <label>Book List</label>
  <div id="book-list" class="profile-display"></div>
</div>
<div class="form-group">
  <label>Count Issued</label>
  <div id="count-issued" class="profile-display"></div>
</div>
<div class="form-group">
  <label>Count Overdue</label>
  <div id="count-overdue" class="profile-display"></div>
</div>
<div class="form-group">
  <label>Count Returned</label>
  <div id="count-returned" class="profile-display"></div>
</div>
<div class="form-group">
  <label for="searchInput">Searchinput</label>
  <input id="searchInput" type="text" />
</div>
<div class="form-group">
  <label for="semesterSelect">Semesterselect</label>
  <select id="semesterSelect">
    <option value="">Select</option>
  </select>
</div>
</div>
      </div>
    </div>

    

    <script src="../../config.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/library.js"></script>
  </body>
</html>
