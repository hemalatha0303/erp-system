services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: erp_db
    # e2-micro and other 1GB VMs: lower defaults so mysqld is not OOM-killed during first init
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --performance_schema=OFF
      --innodb_buffer_pool_size=64M
      --innodb_redo_log_capacity=32M
      --table_open_cache=128
      --max_connections=100
    # No host port publish needed; backend connects via Docker network ("mysql:3306")
    volumes:
      - erp_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 90s

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    image: erp-backend:latest
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: mysql+pymysql://root:root@mysql:3306/erp_db
      JWT_SECRET: ${JWT_SECRET:-change-this-in-production}
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    image: erp-frontend:latest
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  erp_mysql_data:
