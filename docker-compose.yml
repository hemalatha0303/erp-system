version: '3.8'

services:
  backend:
    build: ./Backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=mysql+pymysql://root:Hema7254@mysql:3306/erp_db
      - JWT_SECRET=your-secret-key-here
    depends_on:
      - mysql
    volumes:
      - ./Backend:/app

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=password
      - MYSQL_DATABASE=erp_db
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: